name: Pipeline de Desenvolvimento

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:

    runs-on: ubuntu-latest

    steps:
    
    - name: Baixando o código do repositório
      uses: actions/checkout@v4

    - name: Configurando o Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # PASSO 1: Verificar o que tem no diretório
    - name: Listando arquivos do projeto
      run: |
        echo "=== Arquivos no diretório ==="
        ls -la
        echo "=== Conteúdo do requirements.txt ==="
        cat requirements.txt || echo "Arquivo requirements.txt NÃO encontrado!"

    # PASSO 2: Instalar pip e pytest (de forma explícita)
    - name: Instalando pytest diretamente
      run: |
        python -m pip install --upgrade pip
        pip install pytest
        # Verifica se instalou
        pip show pytest

    # PASSO 3: Verificar instalação
    - name: Testando import do pytest
      run: |
        python -c "import pytest; print(f'✅ Pytest instalado! Versão: {pytest.__version__}')"

    # PASSO 4: Rodar os testes
    - name: Executando os testes
      run: |
        python -m pytest test_calculadora.py -v