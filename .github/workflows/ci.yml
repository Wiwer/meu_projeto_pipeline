name: Pipeline de Desenvolvimento

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # JOB 1: Testes (CI)
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Baixando o código
      uses: actions/checkout@v4

    - name: Configurando Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Instalando dependências
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Executando os testes
      run: |
        python -m pytest test_calculadora.py -v --cov=calculadora --cov-report=term-missing

   deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
    - name: Baixando o código
      uses: actions/checkout@v4

    - name: Instalando ferramentas SSH
      run: |
        sudo apt-get update
        sudo apt-get install -y ssh rsync

    - name: Configurando chave SSH
      env:
        SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      run: |
        mkdir -p ~/.ssh
        echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        # Importante: Adiciona o host às known_hosts
        ssh-keyscan -H ssh.pythonanywhere.com >> ~/.ssh/known_hosts

    - name: Deploy via rsync
      run: |
        rsync -avz --delete \
          --exclude='.git' \
          --exclude='.github' \
          --exclude='__pycache__' \
          --exclude='.pytest_cache' \
          --exclude='venv' \
          -e "ssh -o StrictHostKeyChecking=no" \
          ./ wiwer@ssh.pythonanywhere.com:/home/wiwer/mysite/

    - name: Recarregando aplicação
      run: |
        ssh -o StrictHostKeyChecking=no wiwer@ssh.pythonanywhere.com "touch /var/www/wiwer_pythonanywhere_com_wsgi.py"

    - name: Verificando deploy
      run: |
        echo "✅ Deploy concluído!"
        echo "🌐 https://wiwer.pythonanywhere.com"