name: Pipeline de Desenvolvimento

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # JOB 1: Testes (CI)
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Baixando o código
      uses: actions/checkout@v4

    - name: Configurando Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Instalando dependências
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Executando os testes
      run: |
        python -m pytest test_calculadora.py -v --cov=calculadora --cov-report=term-missing

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
    - name: Baixando o código
      uses: actions/checkout@v4

    - name: Instalando ferramentas SSH
      run: |
        sudo apt-get update
        sudo apt-get install -y ssh rsync

    - name: Configurando chave SSH
      env:
        SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      run: |
        mkdir -p ~/.ssh
        printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        # Importante: Adiciona o host às known_hosts
        ssh-keyscan -H ssh.pythonanywhere.com >> ~/.ssh/known_hosts

    - name: Teste de conexão SSH (debug)
      continue-on-error: true
      run: |
        echo "=== SSH debug (verboso) ==="
        ssh -i ~/.ssh/id_rsa -v wiwer@ssh.pythonanywhere.com || true

    - name: Rsync dry-run (debug)
      continue-on-error: true
      run: |
        echo "=== rsync dry-run ==="
        rsync -avz --delete --dry-run \
          --exclude='.git' \
          --exclude='.github' \
          --exclude='__pycache__' \
          --exclude='.pytest_cache' \
          --exclude='venv' \
          -e "ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no" \
          ./ wiwer@ssh.pythonanywhere.com:/home/wiwer/mysite/ || true

    - name: Deploy via git pull on server
      run: |
        echo "Iniciando deploy via git pull no servidor"
        ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no wiwer@ssh.pythonanywhere.com \
          "if [ -d /home/wiwer/mysite/.git ]; then cd /home/wiwer/mysite && git fetch --all && git reset --hard origin/main; else git clone https://github.com/Wiwer/meu_projeto_pipeline.git /home/wiwer/mysite || exit 1; fi && touch /var/www/wiwer_pythonanywhere_com_wsgi.py"

    - name: Recarregando aplicação
      run: |
        ssh -o StrictHostKeyChecking=no wiwer@ssh.pythonanywhere.com "touch /var/www/wiwer_pythonanywhere_com_wsgi.py"

    - name: Verificando deploy
      run: |
        echo "✅ Deploy concluído!"
        echo "🌐 https://wiwer.pythonanywhere.com"