name: Pipeline de Desenvolvimento

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # JOB 1: Testes (CI)
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Baixando o código
      uses: actions/checkout@v4

    - name: Configurando Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Instalando dependências
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Executando os testes
      run: |
        python -m pytest test_calculadora.py -v --cov=calculadora --cov-report=term-missing

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
    - name: Baixando o código
      uses: actions/checkout@v4

    - name: Sincronizando arquivos no PythonAnywhere
      env:
        PYTHONANYWHERE_API_TOKEN: ${{ secrets.PYTHONANYWHERE_API_TOKEN }}
      run: |
        echo "Sincronizando arquivos para PythonAnywhere"
        BASE_URL="https://www.pythonanywhere.com/api/v0/user/wiwer/files/path/home/wiwer/mysite"
        git ls-files | grep -v '^\.github/' | while IFS= read -r file; do
          echo "Fazendo upload de $file"
          curl --fail --show-error --http1.1 --retry 2 --retry-delay 5 --retry-connrefused \
            -X PUT \
            -H "Authorization: Token $PYTHONANYWHERE_API_TOKEN" \
            -H "Content-Type: application/octet-stream" \
            --upload-file "$file" \
            "$BASE_URL/$file"
        done

    - name: Notificando PythonAnywhere para recarregar o app
      env:
        PYTHONANYWHERE_API_TOKEN: ${{ secrets.PYTHONANYWHERE_API_TOKEN }}
      run: |
        echo "Iniciando reload do app no PythonAnywhere"
        curl -v -i --http1.1 --fail --data '' --max-time 120 --retry 2 --retry-delay 5 --retry-connrefused \
          -H "Authorization: Token $PYTHONANYWHERE_API_TOKEN" \
          -H "Content-Type: application/json" \
          "https://www.pythonanywhere.com/api/v0/user/wiwer/webapps/wiwer.pythonanywhere.com/reload/"

    - name: Verificando deploy
      run: |
        echo "✅ Deploy concluído!"
        echo "🌐 https://wiwer.pythonanywhere.com"