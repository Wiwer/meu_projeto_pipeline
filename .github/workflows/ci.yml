name: Pipeline de Desenvolvimento

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # JOB 1: Testes (CI)
  build-and-test:

    runs-on: ubuntu-latest

    steps:
    
    - name: Baixando o código do repositório
      uses: actions/checkout@v4

    - name: Configurando o Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Listando arquivos do projeto
      run: |
        echo "=== Arquivos no diretório ==="
        ls -la

    - name: Instalando dependências
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Verificando instalação do Flask e Pytest
      run: |
        python -c "import flask; print(f'✅ Flask instalado! Versão: {flask.__version__}')"
        python -c "import pytest; print(f'✅ Pytest instalado! Versão: {pytest.__version__}')"

    - name: Executando os testes com cobertura
      run: |
        python -m pytest test_calculadora.py -v --cov=calculadora --cov-report=term-missing

    # JOB 2: Deploy Automático (CD) - Versão Melhorada
  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
    - name: Baixando o código do repositório
      uses: actions/checkout@v4

    - name: Criando pacote de deploy
      run: |
        # Remove arquivos desnecessários
        rm -rf .git .github __pycache__ .pytest_cache
        zip -r deploy.zip .
        echo "📦 Pacote criado: deploy.zip"

    - name: Deploy no PythonAnywhere (via API)
      env:
        API_TOKEN: ${{ secrets.PYTHONANYWHERE_TOKEN }}
      run: |
        # Upload do arquivo
        curl -X POST \
          -H "Authorization: Token ${API_TOKEN}" \
          -F "content=@deploy.zip" \
          "https://www.pythonanywhere.com/api/v0/user/wiwer/files/path/home/wiwer/deploy.zip"
        
        echo "📤 Upload concluído!"
        
        # Extrai o arquivo na pasta mysite
        curl -X POST \
          -H "Authorization: Token ${API_TOKEN}" \
          "https://www.pythonanywhere.com/api/v0/user/wiwer/files/path/home/wiwer/deploy.zip/extract/"
        
        echo "📂 Extração concluída!"
        
        # Força o reload da aplicação
        curl -X POST \
          -H "Authorization: Token ${API_TOKEN}" \
          "https://www.pythonanywhere.com/api/v0/user/wiwer/webapps/wiwer.pythonanywhere.com/reload/"
        
        echo "🔄 Reload executado!"

    - name: Verificando deploy
      run: |
        echo "✅ Deploy concluído! Aguarde 30 segundos..."
        sleep 30
        echo "🌐 Acesse: https://wiwer.pythonanywhere.com"