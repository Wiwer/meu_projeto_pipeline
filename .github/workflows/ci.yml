name: Pipeline de Desenvolvimento

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # JOB 1: Testes (CI)
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
      fail-fast: false

    steps:
    - name: Baixando o código
      uses: actions/checkout@v4

    - name: Configurando Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/pip
          ~/.cache/pip/http
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Instalando dependências
      run: |
        python -m pip install --upgrade pip
        python -m pip install -r requirements.txt

    - name: Validando stack FastAPI no ambiente CI
      run: |
        python - <<'PY'
        import fastapi, uvicorn, httpx
        print(f"FastAPI: {fastapi.__version__}")
        print(f"Uvicorn: {uvicorn.__version__}")
        print(f"httpx: {httpx.__version__}")
        PY

    - name: Executando os testes com cobertura
      run: |
        python -m pytest -q --cov=calculadora --cov-report=xml --cov-report=term --cov-fail-under=85

    - name: "Debug: listar arquivos e checar coverage.xml"
      if: always()
      run: |
        echo "Python: $(python --version)"
        echo "PWD: $(pwd)"
        ls -la
        if [ -f coverage.xml ]; then
          echo "coverage.xml encontrado"
          head -n 20 coverage.xml || true
        else
          echo "coverage.xml NÃO encontrado"
        fi

    - name: Upload cobertura como artefato
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: coverage.xml

    - name: Publicar cobertura no Codecov
      if: ${{ github.event.repository.private == false }}
      uses: codecov/codecov-action@v4
      with:
        files: coverage.xml
        token: ${{ secrets.CODECOV_TOKEN }}

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
    - name: Baixando o código
      uses: actions/checkout@v4

    - name: Sincronizando arquivos no PythonAnywhere
      env:
        PYTHONANYWHERE_API_TOKEN: ${{ secrets.PYTHONANYWHERE_API_TOKEN }}
      run: |
        echo "Deploy usando FastAPI + Gunicorn/UvicornWorker (Procfile)"
        echo "Buscando source_directory do webapp PythonAnywhere"
        WEBAPP_JSON=$(curl -sS --http1.1 --fail \
          -H "Authorization: Token $PYTHONANYWHERE_API_TOKEN" \
          -H "Accept: application/json" \
          "https://www.pythonanywhere.com/api/v0/user/wiwer/webapps/wiwer.pythonanywhere.com/")
        echo "$WEBAPP_JSON"
        SOURCE_DIR=$(python3 -c "import json,sys; print(json.load(sys.stdin).get('source_directory',''))" <<< "$WEBAPP_JSON")
        if [ -z "$SOURCE_DIR" ]; then
          echo "Erro: source_directory não foi encontrado na resposta do webapp."
          exit 1
        fi
        BASE_URL="https://www.pythonanywhere.com/api/v0/user/wiwer/files/path${SOURCE_DIR}"
        echo "Usando diretório de destino: $SOURCE_DIR"
        echo "Sincronizando arquivos para PythonAnywhere"
        git ls-files | grep -v '^\.github/' | while IFS= read -r file; do
          echo "Fazendo upload de $file"
          curl --fail --show-error --http1.1 --retry 2 --retry-delay 5 --retry-connrefused \
            -X POST \
            -H "Authorization: Token $PYTHONANYWHERE_API_TOKEN" \
            -F "content=@$file" \
            "$BASE_URL/$file"
        done

    - name: Notificando PythonAnywhere para recarregar o app
      env:
        PYTHONANYWHERE_API_TOKEN: ${{ secrets.PYTHONANYWHERE_API_TOKEN }}
      run: |
        echo "Iniciando reload do app no PythonAnywhere"
        curl -v -i --http1.1 --fail --data '' --max-time 120 --retry 2 --retry-delay 5 --retry-connrefused \
          -H "Authorization: Token $PYTHONANYWHERE_API_TOKEN" \
          -H "Content-Type: application/json" \
          "https://www.pythonanywhere.com/api/v0/user/wiwer/webapps/wiwer.pythonanywhere.com/reload/"

    - name: Validar deploy em produção
      run: |
        echo "Verificando endpoints públicos do padrão FastAPI..."
        MAX_RETRIES=5
        RETRY=0
        until [ "$RETRY" -ge "$MAX_RETRIES" ]; do
          if curl -sS --fail "https://wiwer.pythonanywhere.com/docs" | grep -q "Swagger UI" && \
             curl -sS --fail "https://wiwer.pythonanywhere.com/openapi.json" | python3 -c "import sys, json; data=json.load(sys.stdin); assert data.get('info', {}).get('title') == 'Calculadora API'" && \
             curl -sS --fail "https://wiwer.pythonanywhere.com/" | python3 -c "import sys, json; data=json.load(sys.stdin); assert 'mensagem' in data and 'endpoints' in data"; then
            echo "Deploy validado com sucesso no padrão FastAPI."
            break
          fi
          RETRY=$((RETRY + 1))
          echo "Falha ao validar deploy. Tentativa $RETRY/$MAX_RETRIES..."
          sleep 5
        done
        if [ "$RETRY" -ge "$MAX_RETRIES" ]; then
          echo "Não foi possível validar o deploy após $MAX_RETRIES tentativas."
          exit 1
        fi

    - name: Verificando deploy
      run: |
        echo "✅ Deploy concluído!"
        echo "🌐 https://wiwer.pythonanywhere.com"