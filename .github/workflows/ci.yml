name: Pipeline de Desenvolvimento

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:

    runs-on: ubuntu-latest

    steps:
    
    - name: Baixando o código do repositório
      uses: actions/checkout@v4

    - name: Configurando o Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # Step importante: Verificar onde o Python está
    - name: Verificando instalação do Python
      run: |
        which python
        python --version
        python -m pip --version

    # Step melhorado: Instalar dependências com saída detalhada
    - name: Instalando dependências
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt --verbose
        pip list  # Lista todos os pacotes instalados (para debug)

    # Step de verificação: Confirma que o pytest está lá
    - name: Verificando instalação do pytest
      run: |
        python -c "import pytest; print(f'Pytest instalado com sucesso! Versão: {pytest.__version__}')"

    # Step de testes: Agora com certeza que o pytest existe
    - name: Executando os testes
      run: |
        python -m pytest test_calculadora.py -v